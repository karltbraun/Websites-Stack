events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    ###################################################################################
    #               KTBCS 
    ###################################################################################

    # Redirect HTTP to HTTPS for ktbcs.xyz
    server {
        listen 80;
        server_name ktbcs.xyz www.ktbcs.xyz;
        
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS server for ktbcs.xyz
    server {
        listen 443 ssl;
        server_name ktbcs.xyz www.ktbcs.xyz;

        root /var/www/ktbcs;
        index index.html index.htm;

        ssl_certificate /etc/letsencrypt/live/ktbcs.xyz/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/ktbcs.xyz/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location / {
            try_files $uri $uri/ =404;
        }

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
    }

    ###################################################################################
    #               Skinner Editorial
    ###################################################################################

    # Redirect HTTP to HTTPS for skinnereditorial.com
    server {
        listen 80;
        server_name skinnereditorial.com www.skinnereditorial.com;
        
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS server for skinnereditorial.com
    server {
        listen 443 ssl;
        server_name skinnereditorial.com www.skinnereditorial.com;

        root /var/www/skinnereditorial;
        index index.html index.htm;

        ssl_certificate /etc/letsencrypt/live/skinnereditorial.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/skinnereditorial.com/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location / {
            try_files $uri $uri/ =404;
        }

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
    }

    ###################################################################################
    #               SkinnerWilliamsBraun
    ###################################################################################

    # Redirect HTTP to HTTPS for skinnerwilliamsbraun.net
    server {
        listen 80;
        server_name skinnerwilliamsbraun.net www.skinnerwilliamsbraun.net;

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS server for skinnerwilliamsbraun.net
    server {
        listen 443 ssl;
        server_name skinnerwilliamsbraun.net www.skinnerwilliamsbraun.net;

        ssl_certificate /etc/letsencrypt/live/skinnerwilliamsbraun.net/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/skinnerwilliamsbraun.net/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location / {
            proxy_pass http://172.23.0.1:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
    }

    ###################################################################################
    #               karltbraun.net
    ###################################################################################

    # HTTP server for karltbraun.net (no SSL yet)
    server {
        listen 80;
        server_name karltbraun.net www.karltbraun.net;

        root /var/www/karltbraun;
        index index.html index.htm;

        location / {
            try_files $uri $uri/ =404;
        }

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
    }
}
