services:
  nginx:
    container_name: websites-nginx
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/home/karl/Development/KTBCS/Websites/karltbraun/DocumentRoot:/var/www/karltbraun:ro"
      - "/home/karl/Development/KTBCS/Websites/ktbcs/DocumentRoot:/var/www/ktbcs:ro"
      - "/home/karl/Development/KTBCS/Websites/skinnereditorial/DocumentRoot:/var/www/skinnereditorial:ro"
      - "/home/karl/Development/KTBCS/Websites/skinnerbraun/DocumentRoot:/var/www/skinnerbraun:ro"
      - "/home/karl/Development/KTBCS/Websites/nginx.conf:/etc/nginx/nginx.conf:ro"
      - "/etc/letsencrypt:/etc/letsencrypt:ro"
      - "/var/www/certbot:/var/www/certbot:ro"
    networks:
      - websites-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 60s
      timeout: 10s
      retries: 3

networks:
  websites-network:
    driver: bridge
